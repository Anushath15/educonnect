name: CI
on:
  push: { branches: [main, develop] }
  pull_request: { branches: [main, develop] }
env: { NODE_VERSION: "22" }
jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "npm" }
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
  test:
    runs-on: ubuntu-latest
    services:
      postgres: { image: postgres:15-alpine, env: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: educonnect_test }, ports: ["5432:5432"] }
      redis: { image: redis:7-alpine, ports: ["6379:6379"] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "${{ env.NODE_VERSION }}", cache: "npm" }
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/educonnect_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test-access-secret-64-char-long-string-here-12345678901234567890
          JWT_REFRESH_SECRET: test-refresh-secret-64-char-long-string-here-12345678901234567890
          NODE_ENV: test
  build-docker:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f Dockerfile.root --target runner -t educonnect-api:latest .
      - run: docker build -f apps/mobile/Dockerfile -t educonnect-mobile:latest ./apps/mobile
